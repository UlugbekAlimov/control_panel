<div class="space-y-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Посещение</h1>
      <p class="mt-2 text-gray-600">Добавление и корректировка записи посещения.</p>
    </div>
    @if (!embedded) {
      <app-button variant="outline" (clicked)="goBack()">Назад к карте</app-button>
    }
  </div>

  <app-card title="Данные посещения">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-input label="Дата" type="date" [(ngModel)]="record.visitDate"></app-input>
      <app-input label="Врач" [(ngModel)]="record.doctor"></app-input>
      <app-input label="Диагноз" [(ngModel)]="record.diagnosis"></app-input>
      <app-select label="Статус" [options]="statusOptions" [(ngModel)]="record.status"></app-select>
      <app-input label="Примечание" [(ngModel)]="record.notes"></app-input>
    </div>
  </app-card>

  <div class="flex flex-wrap items-center gap-3">
    <app-button variant="primary" (clicked)="save()">Сохранить</app-button>
    <app-button variant="secondary" (clicked)="update()">Сохранить изменение</app-button>
  </div>

  @if (status()) {
    <app-card>
      <div class="flex flex-col gap-2 text-sm text-gray-700">
        <div class="flex items-center gap-2">
          <span class="font-medium">Статус:</span>
          <span class="font-semibold text-rose-700">{{ status() }}</span>
        </div>
        @if (lastActionAt()) {
          <div>Последнее действие: {{ lastActionAt() }}</div>
        }
      </div>
    </app-card>
  }
</div>
