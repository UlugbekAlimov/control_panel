<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">
      {{ recordId ? 'Запись о пересечении границы' : 'Новая запись о пересечении' }}
    </h1>
  </div>

  @if (errorMessage) {
    <app-card>
      <p class="text-sm text-red-600">{{ errorMessage }}</p>
    </app-card>
  }

  <app-card title="Данные пересечения">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-select
        label="Гражданин"
        placeholder="Выберите гражданина"
        [options]="peopleOptions()"
        [disabled]="isReferenceLoading || isLoading"
        [(ngModel)]="form.peopleId"
      ></app-select>
      <app-select
        label="Пользователь"
        placeholder="Выберите пользователя"
        [options]="userOptions()"
        [disabled]="isReferenceLoading || isLoading"
        [(ngModel)]="form.userId"
      ></app-select>
      <app-input
        label="Дата выезда"
        type="datetime-local"
        [(ngModel)]="form.departureDate"
      ></app-input>
      <app-input
        label="Дата возврата"
        type="datetime-local"
        [(ngModel)]="form.returnDate"
      ></app-input>
      <app-select
        label="Вне границы"
        [options]="outsideBorderOptions"
        [(ngModel)]="form.outsideBorder"
      ></app-select>
      <app-input label="Страна" [(ngModel)]="form.country"></app-input>
      <app-input label="Описание" [(ngModel)]="form.description"></app-input>
    </div>
  </app-card>

  <div class="flex flex-wrap items-center gap-3">
    <app-button
      variant="primary"
      [loading]="isSubmitting"
      [disabled]="isSubmitting || isLoading || isReferenceLoading"
      (clicked)="save()"
    >
      {{ recordId ? 'Сохранить изменения' : 'Сохранить' }}
    </app-button>
    <app-button variant="secondary" [disabled]="isSubmitting" (clicked)="close()"
      >Закрыть</app-button
    >
  </div>

  @if (status()) {
    <app-card>
      <div class="flex flex-col gap-2 text-sm text-gray-700">
        <div class="flex items-center gap-2">
          <span class="font-medium">Статус:</span>
          <span class="font-semibold text-cyan-700">{{ status() }}</span>
        </div>
        @if (lastActionAt()) {
          <div>Последнее действие: {{ lastActionAt() }}</div>
        }
      </div>
    </app-card>
  }
</div>
