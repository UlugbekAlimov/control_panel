<div class="w-full">
  @if (label) {
    <label [for]="selectId" class="block text-sm font-medium text-gray-700 mb-1">
      {{ label }}
      @if (required) {
        <span class="text-red-500">*</span>
      }
    </label>
  }
  
  <select
    [id]="selectId"
    [disabled]="disabled"
    [required]="required"
    [value]="(internalValue ?? value) || ''"
    (change)="onSelect($event)"
    (blur)="onBlur()"
    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:bg-gray-100 disabled:cursor-not-allowed"
    [class.border-red-500]="error"
  >
    <option value="" disabled>{{ placeholder }}</option>
    @for (option of options; track option.value) {
      <option [value]="option.value" [disabled]="option.disabled">
        {{ option.label }}
      </option>
    }
  </select>

  @if (error) {
    <p class="mt-1 text-sm text-red-600">{{ error }}</p>
  }
  
  @if (hint && !error) {
    <p class="mt-1 text-sm text-gray-500">{{ hint }}</p>
  }
</div>
