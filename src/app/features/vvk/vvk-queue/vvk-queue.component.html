<div class="space-y-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Очередь ВВК</h1>
      <p class="mt-2 text-gray-600">Медосвидетельствование и присвоение категории годности.</p>
    </div>
    <app-button variant="primary" (clicked)="openCreate()">Новая запись</app-button>
  </div>

  <app-card>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-input label="ФИО" placeholder="Фамилия Имя" [(ngModel)]="filters.fullName"></app-input>
      <app-input label="Citizen ID" placeholder="CIT-000001" [(ngModel)]="filters.citizenId"></app-input>
    </div>
  </app-card>

  <app-card>
    <app-table
      [columns]="columns"
      [data]="filteredQueue"
      [rowTemplate]="rowTemplate"
      [actionsTemplate]="actionsTemplate"
      [emptyMessage]="'Очередь пуста'"
    >
      <ng-template #rowTemplate let-row>
        <td class="px-6 py-4 text-sm text-gray-900">{{ row.fullName }}</td>
        <td class="px-6 py-4 text-sm text-gray-900">{{ row.citizenId }}</td>
        <td class="px-6 py-4 text-sm text-gray-900">{{ row.birthDate }}</td>
        <td class="px-6 py-4 text-sm text-gray-900">{{ getStatusLabel(row.status) }}</td>
        <td class="px-6 py-4 text-sm text-gray-900">{{ row.lastExam || '-' }}</td>
      </ng-template>

      <ng-template #actionsTemplate let-row>
        <div class="flex flex-wrap items-center gap-2">
          <app-button variant="outline" size="sm" (clicked)="selectCitizen(row)">Карточка</app-button>
          <app-button variant="outline" size="sm" (clicked)="openMedical(row)">Медкарта</app-button>
          <app-button variant="primary" size="sm" (clicked)="openResult(row)">Результат</app-button>
        </div>
      </ng-template>
    </app-table>
  </app-card>

  <app-citizen-read-card [citizen]="selectedCitizen()"></app-citizen-read-card>

  <app-modal [show]="showResultModal" [title]="'Результат ВВК'" size="xl" (closed)="closeResult()">
    @if (showResultModal) {
      <app-vvk-result-create-edit [citizen]="selectedCitizen()" [recordId]="selectedResultId"></app-vvk-result-create-edit>
    }
  </app-modal>

  <app-modal [show]="showMedicalModal" [title]="'История болезни (read-only)'" size="xl" (closed)="closeMedical()">
    @if (showMedicalModal) {
      <app-medical-record-read-only [citizenName]="selectedCitizen()?.fullName || '—'"></app-medical-record-read-only>
    }
  </app-modal>
</div>
